<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品牌视觉系统 - Yangwan作品集</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans">
    <nav class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-8 md:px-12 py-8 backdrop-blur-sm bg-black/30">
        <a href="index.html#works" class="text-sm font-light tracking-[0.2em] uppercase hover:text-orange-400 transition-colors">← 返回</a>
    </nav>

    <main class="pt-32 px-6 md:px-12 max-w-6xl mx-auto pb-24">
        <h1 class="text-5xl md:text-7xl font-serif font-bold mb-6">品牌视觉系统</h1>
        <p class="text-gray-400 text-lg mb-12 max-w-3xl">为初创科技公司打造的完整品牌 VI 设计，包含 Logo 演化、色彩规范、排版系统及全套办公物料的实地应用。</p>

        <img src="https://images.unsplash.com/photo-1549887552-cb1071d3e5ca?w=1200&auto=format&fit=crop" class="w-full rounded-2xl mb-16" alt="品牌视觉系统">

        <div class="grid md:grid-cols-3 gap-8 mb-16">
            <div>
                <h3 class="text-orange-400 text-xs tracking-wider mb-2">角色</h3>
                <p class="text-gray-300">品牌设计师</p>
            </div>
            <div>
                <h3 class="text-orange-400 text-xs tracking-wider mb-2">时间</h3>
                <p class="text-gray-300">2022年</p>
            </div>
            <div>
                <h3 class="text-orange-400 text-xs tracking-wider mb-2">工具</h3>
                <p class="text-gray-300">Illustrator, Figma</p>
            </div>
        </div>

        <div class="prose prose-invert max-w-none">
            <h2 class="text-3xl font-serif font-semibold mb-4">项目背景</h2>
            <p class="text-gray-400 leading-relaxed mb-8">为一家AI科技初创公司建立完整的品牌视觉识别系统，传达创新、专业、可信赖的品牌形象。</p>

            <h2 class="text-3xl font-serif font-semibold mb-4">设计方案</h2>
            <p class="text-gray-400 leading-relaxed mb-8">设计了简洁现代的Logo，建立了完整的色彩体系和字体规范，并应用到各类办公物料和数字媒体中。</p>
        </div>
    </main>
