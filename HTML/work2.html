<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>铜镜匠心 - 李阳婉作品集</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans">
    <nav class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-8 md:px-12 py-8 backdrop-blur-sm bg-black/50 border-b border-white/5">
        <a href="index.html#works" class="text-sm font-light tracking-[0.2em] uppercase hover:text-orange-400 transition-colors">← 返回作品列表</a>
        <span class="text-xs text-gray-500">网页更新中...</span>
    </nav>

    <main class="pt-32 px-6 md:px-12 max-w-6xl mx-auto pb-24">
        <h1 class="text-5xl md:text-7xl font-serif font-bold mb-6">铜镜匠心</h1>
        <p class="text-gray-400 text-lg mb-12 max-w-3xl">基于具身认知理论的铜镜铸造技术科普交互设计，用Unity+Kinect手势识别+Arduino传感器等技术实现传统技艺的数字还原和具身化科普策略。</p>

        <img src="work2.png"
             class="w-full rounded-2xl mb-16 object-cover bg-white/5"
             loading="lazy"
             decoding="async"
             alt="铜镜匠心">

        <div class="grid md:grid-cols-3 gap-8 mb-16 border-y border-white/10 py-10">
            <div>
                <h3 class="text-orange-400 text-xs tracking-wider mb-2 uppercase">Role</h3>
                <p class="text-gray-300">交互设计师</p>
            </div>
            <div>
                <h3 class="text-orange-400 text-xs tracking-wider mb-2 uppercase">Timeline</h3>
                <p class="text-gray-300">2023年</p>
            </div>
            <div>
                <h3 class="text-orange-400 text-xs tracking-wider mb-2 uppercase">Tools</h3>
                <p class="text-gray-300">Unity3D, Kinect, Arduino</p>
            </div>
        </div>

        <div class="prose prose-invert max-w-3xl mx-auto">
            <h2 class="text-3xl font-serif font-semibold mb-4 text-white">项目背景</h2>
            <p class="text-gray-400 leading-relaxed mb-12">基于具身认知理论，探索传统铜镜铸造技术的数字化科普方式。</p>

            <h2 class="text-3xl font-serif font-semibold mb-4 text-white">设计方案</h2>
            <p class="text-gray-400 leading-relaxed mb-8">运用Unity+Kinect手势识别+Arduino传感器等技术，实现传统技艺的数字还原和具身化科普策略。</p>
        </div>
    </main>

    <footer class="border-t border-white/10 mt-12 py-24 text-center hover:bg-white/5 transition-colors group cursor-pointer" onclick="window.location.href='work3.html'">
        <p class="text-orange-400 text-xs tracking-[0.2em] uppercase mb-4">Next Project</p>
        <h2 class="text-4xl md:text-5xl font-serif font-bold group-hover:text-orange-400 transition-colors">穹天玉宇沉浸式中国藻井数字艺术体验空间 →</h2>
    </footer>
